<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Червепедия - Новости Скотоублюдии</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script async src="https://telegram.org/js/telegram-widget.js?22"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
    .load-more-button {
        background-color: #fdefe6;
        color: black;
        padding: 10px 20px;
        border: 2px solid #fdefe6;
        border-radius: 20px;
        transition: background-color 0.3s;
    }
    .load-more-button:hover {
        background-color: #f9ccb5;
        color: black;
    }

    #navigation-buttons {
        display: flex;
        justify-content: space-between;
        margin: 20px;
    }

    #load-more {
        margin: 0 auto;
        display: flex;
    }

    #go-to-beginning {
        margin-left: auto;
    }

    #go-to-beginning i {
        display: none;
    }

    .telegram-post {
        border: 2px solid transparent;
        transition: border-color 0.3s;
    }

    .telegram-post:hover {
        border-color: #00ff00;
    }
</style>
</head>
<body>
<div id="telegram-posts"></div>
<div id="navigation-buttons">
    <button class="load-more-button" onclick="loadFirstPosts()">Начало</button>
    <div id="load-more">
        <button class="load-more-button" onclick="loadMorePosts()">Еще</button>
    </div>
</div>

<script>
let posts = [
'chervethread_2ch/64',
'chervethread_2ch/65',
'nexta_live/74247',
'chervethread_2ch/70',
'chervethread_2ch/66',      
'nexta_live/73636',
'chervethread_2ch/64',
'nexta_live/74200',
'mar_lik/38023',
'chervethread_2ch/57',
'pravyvzgliad/18659',
'chervethread_2ch/54',
'nexta_live/74103',
'chervethread_2ch/53',
'nexta_live/74102',
'nexta_live/74099',
'nexta_live/74083',
'nexta_live/74070',
'oko18_channel/8183',
'nexta_live/73801',
'nexta_live/73797',
'nexta_live/73784',
'nexta_live/73748',
'nexta_live/73707',
'nexta_live/73688',
'nexta_live/72153',
'chervethread_2ch/62'
];

let currentPage = 0;
let postsPerPage = 5;
let currentPostIndex = 0;

function displayPosts() {
    let end = currentPostIndex + postsPerPage;
    if (end >= posts.length) {
        end = posts.length;
    }

    for (let i = currentPostIndex; i < end; i++) {
        let script = document.createElement('script');
        script.src = `https://telegram.org/js/telegram-widget.js?22`;
        script.setAttribute('data-telegram-post', posts[i]);
        script.setAttribute('data-width', '100%');
        script.classList.add('telegram-post');
        document.getElementById('telegram-posts').appendChild(script);
    }

    if (end < posts.length) {
        document.getElementById('navigation-buttons').style.display = 'flex';
    } else {
        document.getElementById('navigation-buttons').style.display = 'none';
    }
}

function loadMorePosts() {
    currentPostIndex += postsPerPage;
    currentPage++;
    document.getElementById('telegram-posts').innerHTML = '';
    displayPosts();
}

function loadFirstPosts() {
    currentPage = 0;
    currentPostIndex = 0;
    document.getElementById('telegram-posts').innerHTML = '';
    displayPosts();
}

displayPosts();
</script>
</body>
</html>

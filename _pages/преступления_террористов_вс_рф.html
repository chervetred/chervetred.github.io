<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Карусель с изображениями и Fancybox</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.css" />
  <style>
    .carousel {
      position: relative; /* To position buttons relative to carousel */
      max-width: 450px; /* Adjust as needed */
    }
    .item {
      display: none; /* Hide all items initially */
    }
    .item.active {
      display: block; /* Show only the active item */
    }
    .item img {
      max-width: 100%; /* Adjust image width as needed */
      max-height: 450px;
    }
    .buttons {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }
    .button {
      margin: 0 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

    <div class="item"><a href="https://i.guim.co.uk/img/media/f84a7b9a273ef558dcdb349c017f9c0e8b185437/0_297_6720_4183/master/6720.jpg?width=1900&dpr=1&s=none" data-fancybox="gallery"><img src="https://i.guim.co.uk/img/media/f84a7b9a273ef558dcdb349c017f9c0e8b185437/0_297_6720_4183/master/6720.jpg?width=1900&dpr=1&s=none" alt="червепедия - военные преступления россии"></a></div>

    <div class="buttons"></div> 
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.js"></script>
  <script>
    $(document).ready(function() {
      // Initialize Fancybox
      $(".item a").fancybox();

      // Generate buttons
      const $carousel = $('.carousel');
      const $items = $carousel.find('.item');
      const $buttonsContainer = $carousel.find('.buttons');
      
      $items.each(function(index) {
        const $button = $('<span class="button">').text(index + 1);
        $button.on('click', function() {
          $items.removeClass('active');
          $(this).addClass('active');
          $items.eq(index).addClass('active');
        });
        $buttonsContainer.append($button);
      });

      // Activate the first button
      $buttonsContainer.find('.button').first().addClass('active');
    });
  </script>
</body>
</html>

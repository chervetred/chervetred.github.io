<html lang="en">
<head>

  <style>
    /* Стили для карусели */
    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;

      scroll-behavior: smooth; /* Плавный скролл */
      max-height: 450px;
    }
    .item {
      flex: 0 0 auto;
      scroll-snap-align: start;
    }
    /* Стили для изображений */
    .item img {
      max-height: 450px;
      display: block;
      margin: auto;
    }
  </style>
</head>

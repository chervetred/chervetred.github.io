<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Post Carousel</title>
    <!-- Добавляем ссылку на стили Slick Carousel -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <!-- Добавляем ссылку на jQuery, которая необходима для Slick Carousel -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Добавляем ссылку на Slick Carousel JS файл -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <style>
        /* Стили для контейнера с каруселью */
        #telegram-posts {
            width: 80%;
            margin: 0 auto;
            position: relative;
        }
        /* Стили для кнопок перелистывания */
        .slick-prev, .slick-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            font-size: 24px;
            cursor: pointer;
        }
        .slick-prev {
            left: -30px;
        }
        .slick-next {
            right: -30px;
        }
        /* Стили для нумерации */
        .slick-dots {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div id="telegram-posts">
    <div><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74596" data-width="100%"></script></div>
    <div><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74594" data-width="100%"></script></div>
    <div><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74593" data-width="100%"></script></div>
    <div><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74592" data-width="100%"></script></div>
    <div><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74591" data-width="100%"></script></div>
</div>

<script>
$(document).ready(function(){
    $('#telegram-posts').slick({
        dots: true,
        infinite: true,
        speed: 300,
        slidesToShow: 1,
        adaptiveHeight: true,
        prevArrow: '<button type="button" class="slick-prev">Previous</button>',
        nextArrow: '<button type="button" class="slick-next">Next</button>'
    });
});
</script>

</body>
</html>

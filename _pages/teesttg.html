let currentPage = 0;
let postsPerPage = 1;
let currentPostIndex = 0;

function displayPosts() {
    let end = currentPostIndex + postsPerPage;
    if (end >= posts.length) {
        end = posts.length;
    }

    for (let i = 0; i < posts.length; i++) {
        let postContainer = document.createElement('div');
        postContainer.className = 'post-container';
        if (i >= currentPostIndex && i < end) {
            postContainer.className += ' visible';
            postContainer.innerHTML = `<iframe src="https://t.me/${posts[i]}" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" style="width: 100%; height: 600px;"></iframe>`;
        }
        document.getElementById('telegram-posts').appendChild(postContainer);
    }
}

function loadFirstPosts() {
    currentPostIndex = 0;
    document.getElementById('telegram-posts').innerHTML = '';
    displayPosts();
}

function loadMorePosts() {
    currentPostIndex += postsPerPage;
    document.getElementById('telegram-posts').innerHTML = '';
    displayPosts();
}

displayPosts();

document.getElementById('left-arrow').addEventListener('click', function() {
    if (currentPostIndex > 0) {
        currentPostIndex--;
        document.getElementById('telegram-posts').innerHTML = '';
        displayPosts();
    }
});

document.getElementById('right-arrow').addEventListener('click', function() {
    if (currentPostIndex + postsPerPage < posts.length) {
        currentPostIndex++;
        document.getElementById('telegram-posts').innerHTML = '';
        displayPosts();
    }
});

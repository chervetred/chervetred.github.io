let currentPostIndex = 0;
let currentPage = 0;
let postsPerPage = 10;

function displayPosts() {
    let end = currentPostIndex + postsPerPage;
    if (end >= posts.length) {
        end = posts.length;
    }

    let postsContainer = $('#telegram-posts');
    postsContainer.empty();

    for (let i = currentPostIndex; i < end; i++) {
        let postDiv = $('<div></div>').attr('data-telegram-post', posts[i]);
        postsContainer.append(postDiv);
    }

    $('.carousel').slick({
        infinite: true,
        slidesToShow: 1,
        slidesToScroll: 1,
        arrows: true,
        prevArrow: '<button type="button" class="slick-prev">Previous</button>',
        nextArrow: '<button type="button" class="slick-next">Next</button>'
    });

    if (end < posts.length) {
        document.getElementById('navigation-buttons').style.display = 'flex';
    } else {
        document.getElementById('navigation-buttons').style.display = 'none';
    }
}

function loadMorePosts() {
    currentPostIndex += postsPerPage;
    currentPage++;
    displayPosts();
}

displayPosts();

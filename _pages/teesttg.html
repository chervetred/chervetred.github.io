<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Post Carousel</title>
    <!-- Подключение стилей библиотеки Swiper -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <!-- Подключение jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Подключение библиотеки Swiper -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; }
        /* Стили для карусели */
        .swiper-container {
          width: 80%;
          margin: 20px auto;
        }
        /* Стили для отдельного слайда */
        .swiper-slide {
          text-align: center;
          font-size: 18px;
          background: #fff;
          border: 1px solid #ccc;
          border-radius: 5px;
          padding: 20px;
        }
    </style>
</head>
<body>
<div class="swiper-container">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74596" data-width="100%"></script></div>
        <div class="swiper-slide"><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74594" data-width="100%"></script></div>
        <div class="swiper-slide"><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74593" data-width="100%"></script></div>
        <div class="swiper-slide"><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74592" data-width="100%"></script></div>
        <div class="swiper-slide"><script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="nexta_live/74591" data-width="100%"></script></div>
    </div>
</div>
<script>
    var swiper = new Swiper('.swiper-container', {
        slidesPerView: 3, /* Показываем 3 поста одновременно, можно изменить на нужное количество */
        spaceBetween: 30, /* Добавляем расстояние между постами */
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новости Скотоублюдии</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script async src="https://telegram.org/js/telegram-widget.js?22"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
    .load-more-button {
        background: linear-gradient(45deg, rgba(255, 0, 0, 0.5), rgba(0, 0, 255, 0.5));
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.3s ease;
    }
    .load-more-button:hover {
        opacity: 1;
    }
</style>
</head>
<body>
<div id="telegram-posts"></div>
<div id="navigation-buttons">
    <button class="load-more-button" onclick="loadPreviousPosts()"><i class="fas fa-arrow-left"></i> Назад</button>
    <button class="load-more-button" onclick="loadFirstPosts()"><i class="fas fa-angle-double-left"></i> В начало</button>
    <button class="load-more-button" onclick="loadMorePosts()">Загрузить следующие <i class="fas fa-arrow-down"></i></button>
</div>

<script>
let posts = [
    'nexta_live/73636',
    'chervethread_2ch/56',
    'chervethread_2ch/54',
    'nexta_live/74103',
    'chervethread_2ch/53',
    'nexta_live/74102',
    'nexta_live/74099',
    'nexta_live/74083',
    'nexta_live/74070',
    'oko18_channel/8183',
    'nexta_live/73801',
    'nexta_live/73797',
    'nexta_live/73784',
    'nexta_live/73748',
    'nexta_live/73748',
    'nexta_live/73707',
    'nexta_live/73688',
    'nexta_live/72153'
];

let currentPage = 0;
let postsPerPage = 5;

function displayPosts() {
    let start = currentPage * postsPerPage;
    let end = start + postsPerPage;
    if (end >= posts.length) {
        end = posts.length;
    }

    for (let i = start; i < end; i++) {
        let script = document.createElement('script');
        script.src = `https://telegram.org/js/telegram-widget.js?22`;
        script.setAttribute('data-telegram-post', posts[i]);
        script.setAttribute('data-width', '100%');
        document.getElementById('telegram-posts').appendChild(script);
    }

    if (end < posts.length) {
        document.getElementById('navigation-buttons').style.display = 'flex';
    }
}

function loadMorePosts() {
    currentPage++;
    document.getElementById('telegram-posts').innerHTML = '';
    displayPosts();
}

function loadPreviousPosts() {
    if (currentPage > 0) {
        currentPage--;
        document.getElementById('telegram-posts').innerHTML = '';
        displayPosts();
    }
}

function loadFirstPosts() {
    currentPage = 0;
    document.getElementById('telegram-posts').innerHTML = '';
    displayPosts();
}

displayPosts();
</script>
</body>
</html>
